project: "textbook-rag"
version: "1.1"
started_at: "2026-03-08T00:00:00-05:00"
current_phase: requirements

previous_versions:
  v1.0:
    completed_at: "2026-03-07T22:15:00-05:00"
    docs_dir: "docs/v1.0"
    review_summary: "All 10 phases PASS, 0 blocking issues, 86/100 code review score, 83% test coverage"

config:
  parallel_frontend_backend: false
  auto_check: true
  docs_dir: docs/v1.1

phases:
  requirements:
    name: "需求分析"
    status: in_progress
    started_at: "2026-03-08T00:00:00-05:00"
    output: "docs/v1.1/requirements/requirements.md"
    skill: "dev-product_manager"
    role: "product_manager"
    checks:
      - file_exists: "docs/v1.1/requirements/requirements.md"
      - file_not_empty: "docs/v1.1/requirements/requirements.md"

  prd:
    name: "产品需求文档"
    status: not_started
    output: "docs/v1.1/requirements/prd.md"
    skill: "dev-product_manager"
    role: "product_manager"
    depends_on: ["requirements"]
    checks:
      - file_exists: "docs/v1.1/requirements/prd.md"
      - file_not_empty: "docs/v1.1/requirements/prd.md"

  architecture:
    name: "系统架构"
    status: not_started
    output: "docs/v1.1/architecture/system-architecture.md"
    skill: "dev-senior_architect"
    role: "architect"
    depends_on: ["prd"]
    checks:
      - file_exists: "docs/v1.1/architecture/system-architecture.md"
      - file_not_empty: "docs/v1.1/architecture/system-architecture.md"

  stories:
    name: "任务分解"
    status: not_started
    output: "docs/v1.1/sprints/sprint-plan.md"
    skill: "dev-senior_fullstack"
    role: "tech_lead"
    depends_on: ["architecture"]
    checks:
      - file_exists: "docs/v1.1/sprints/sprint-plan.md"
      - file_not_empty: "docs/v1.1/sprints/sprint-plan.md"

  database:
    name: "数据库设计"
    status: not_started
    output: "docs/v1.1/codemaps/database.md"
    skill: "dev-senior_data_engineer"
    role: "architect"
    depends_on: ["architecture"]
    checks:
      - file_exists: "docs/v1.1/codemaps/database.md"

  backend:
    name: "后端开发"
    status: not_started
    output: "backend/app/"
    skill: "dev-senior_backend"
    role: "backend_engineer"
    depends_on: ["database", "stories"]
    checks:
      - command: "uv run ruff check backend/"
      - command: "uv run pytest --tb=short -q"

  frontend:
    name: "前端开发"
    status: not_started
    output: "frontend/src/"
    skill: "dev-senior_frontend"
    role: "frontend_engineer"
    depends_on: ["stories"]
    can_parallel_with: ["backend"]
    checks:
      - command: "npm run build"
      - command: "npx tsc --noEmit"

  testing:
    name: "测试"
    status: not_started
    output: "docs/v1.1/test-report.md"
    skill: "dev-senior_qa"
    role: "qa_engineer"
    depends_on: ["backend"]
    checks:
      - command: "uv run pytest --tb=short -q"

  review:
    name: "代码审查"
    status: not_started
    output: "docs/v1.1/review-report.md"
    skill: "dev-code_reviewer"
    role: "code_reviewer"
    depends_on: ["testing"]
    checks:
      - file_exists: "docs/v1.1/review-report.md"

  deployment:
    name: "部署"
    status: not_started
    output: "docs/v1.1/deployment.md"
    skill: "dev-senior_devops"
    role: "devops_engineer"
    depends_on: ["review"]
    checks:
      - file_exists: "docs/v1.1/deployment.md"
