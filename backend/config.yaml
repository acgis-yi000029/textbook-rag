# AI Textbook Q&A System — Configuration
# All paths are relative to backend/ directory

ollama:
  host: "http://localhost:11434"
  model: "qwen2.5:0.5b"
  timeout: 30

embedding:
  model: "Qwen/Qwen3-Embedding-0.6B"
  dimension: 1024

retrieval:
  top_k: 5
  rrf_k: 60
  parallel_timeout: 10
  methods:
    bm25: true
    semantic: true
    pageindex: true
    metadata: true

chunking:
  max_tokens: 512
  overlap_tokens: 50

paths:
  mineru_output: "../data/mineru_output"
  textbooks_dir: "../textbooks"
  sqlite_db: "data/textbook_qa.db"
  chroma_db: "data/chroma_db"
  pageindex_trees: "data/pageindex_trees"

books: {}
