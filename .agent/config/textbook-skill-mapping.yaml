    secondary:
      - beazley_python_cookbook # 部署脚本编写
      - ejsmont_web_scalability # 缓存、负载均衡、CDN、扩展模式
      - google_swe # CI/CD、大规模变更、版本控制文化
    usage: |
      DevOps 工作时：
      - Git 工作流/分支策略 → Pro Git Ch3 (branching), Ch5 (distributed)
      - 监控/告警 → SRE Ch6 (monitoring), Ch10 (alerting)
      - 稳定性/容错 → Release It! Ch3-5 (stability patterns)
      - CI/CD 最佳实践 → Google SWE Ch23-25
      - 扩展性 → Web Scalability (全书)
      - 部署脚本 → Python Cookbook Ch13 (system)

