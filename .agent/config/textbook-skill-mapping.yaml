      - grinstead_snell_probability # 概率性测试
      - martin_clean_code # 单元测试章节 (Ch9)
      - hunt_pragmatic_programmer # 测试哲学与自动化
    usage: |
      编写测试时：
      - pytest 用法/fixture → pytest Book (全书)
      - 测试策略/文化 → Google SWE Ch11-14
      - Python 测试模式 → Python Cookbook Ch14
      - 单元测试原则 → Clean Code Ch9
      - 测试自动化哲学 → Pragmatic Programmer Ch41-43
      - 边界值分析 → 理解数据模型 via Fluent Python
      - 统计性测试 → Think Stats Ch7-9 (假设检验)

  dev-ui_ux_designer:
    primary:
      - krug_dont_make_me_think # Web 可用性
      - norman_design_everyday_things # 设计原则
    secondary: []
    usage: |
      UI/UX 设计时：
      - 默认按 MVP 优先，先收缩范围，只保留主任务所需界面
      - 导航设计 → Don't Make Me Think Ch6-7
      - 可用性测试 → Don't Make Me Think Ch9
      - 交互设计原则 → Design of Everyday Things Ch1-3 (概念模型、反馈)
      - 错误处理 UX → Design of Everyday Things Ch5 (人为错误)
      - 无障碍设计 → Don't Make Me Think Ch12

