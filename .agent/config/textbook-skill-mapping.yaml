# ── How to Access Textbook Content ──
access:
  markdown_path: "data/mineru_output/{book_key}/{book_key}/auto/{book_key}.md"
  content_list_path: "data/mineru_output/{book_key}/{book_key}/auto/{book_key}_content_list.json"
  topic_index: "textbooks/topic_index.json"
  instructions: |
    1. Identify the relevant textbook(s) from skill_mappings
    2. Use topic_index.json to find specific chapters/sections
    3. Read the markdown file at the path above for full content
    4. Cite the source in code comments:
       # Ref: Goodfellow et al., Deep Learning, Ch8.5 (Adaptive Learning Rates)
       # Ref: Ramalho, Fluent Python, Ch17 (Iterators & Generators)
