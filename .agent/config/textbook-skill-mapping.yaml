      - 代码整洁标准 → Clean Code Ch2-7
      - 代码坏味道 → Refactoring Ch3 (Bad Smells)
      - Python 风格 → Fluent Python (Pythonic patterns)
      - JS 类型陷阱 → YDKJS Types & Grammar
      - Code Review 流程 → Google SWE Ch9
      - 性能问题 → CLRS (复杂度分析)
      - 并发问题 → Fluent Python Ch19, YDKJS Async
      - DRY/正交性 → Pragmatic Programmer

  dev-code_comment:
    primary:
