# Textbook ↔ Skill Mapping
# Maps each skill to its relevant textbook sources from data/mineru_output/
#
# Usage: Before generating code, the skill should consult these textbooks
# for authoritative reference. Access the textbook content at:
#   data/mineru_output/{book_key}/{book_key}/auto/{book_key}.md
#
# The topic_index.json at textbooks/topic_index.json provides
# keyword → chapter/section mappings for quick lookup.

# ── Textbook Registry ──
