# ── Skill → Textbook Mapping ──
skill_mappings:
  dev-senior_backend:
    primary:
      - ramalho_fluent_python # Python 高级特性、数据模型、并发
      - beazley_python_cookbook # Python 实用模式、网络编程、元编程
      - percival_cosmic_python # DDD、Repository、Service Layer、Unit of Work
      - fontaine_art_of_postgresql # SQL 模式、索引、窗口函数、查询优化
      - lubanovic_fastapi_modern_web # FastAPI 框架、依赖注入、中间件、SSE
    secondary:
      - cormen_CLRS # 算法与数据结构（API 性能优化）
      - manning_intro_to_ir # 搜索与索引（搜索 API 实现）
      - downey_think_stats_2e # 统计分析（数据 API）
      - martin_clean_code # 命名、函数设计、错误处理
      - gof_design_patterns # 后端常用模式（Factory, Strategy, Observer）
      - kleppmann_ddia # 存储引擎、事务、复制
      - fowler_refactoring # 代码重构方法论
      - kreibich_using_sqlite # SQLite 内部原理、WAL 模式、嵌入式数据库
      - gourley_http_definitive_guide # HTTP 协议深度、Headers、代理架构
    usage: |
      生成 Python 后端代码时：
      - 数据模型/ORM 设计 → 查阅 Fluent Python Ch1-4 (数据模型)
      - 并发/异步 → 查阅 Fluent Python Ch19-21, Python Cookbook Ch12
      - 装饰器/元编程 → 查阅 Fluent Python Ch7-9, Python Cookbook Ch9
      - 架构模式 (DDD) → 查阅 Cosmic Python Ch1-7
      - SQL 优化/复杂查询 → 查阅 Art of PostgreSQL
      - FastAPI 开发 → 查阅 FastAPI Modern Web (全书)
      - SQLite 操作 → 查阅 Using SQLite (WAL, 事务, 并发)
      - HTTP 协议/代理 → 查阅 HTTP Definitive Guide Ch6-8 (代理/网关)
      - 代码整洁 → 查阅 Clean Code Ch2-4
      - 设计模式 → 查阅 GoF (按需)
      - 重构 → 查阅 Refactoring (代码坏味道目录)
      - 算法优化 → 查阅 CLRS 相关章节
      - 搜索功能 → 查阅 Manning IR Ch1-8

  dev-senior_frontend:
    primary:
      - flanagan_js_definitive_guide # JavaScript 权威指南
      - haverbeke_eloquent_javascript # JavaScript 编程艺术
      - basarat_typescript_deep_dive # TypeScript 类型系统、泛型、类型守卫
    secondary:
      - simpson_ydkjs_scope_closures # 作用域与闭包
      - simpson_ydkjs_this_object_prototypes # this 与原型
      - simpson_ydkjs_async_performance # 异步与性能
      - simpson_ydkjs_types_grammar # 类型与语法
      - simpson_ydkjs_es6_beyond # ES6+ 新特性
      - simpson_ydkjs_up_going # JS 概览
      - martin_clean_code # 命名、函数设计、组件结构原则
      - fowler_refactoring # 前端代码重构手法、组件拆分
      - gof_design_patterns # Observer（事件）、Strategy（渲染）、Decorator（HOC）
      - hunt_pragmatic_programmer # DRY、正交性、可维护性
    usage: |
      生成前端代码时：
      - TypeScript 类型设计 → TS Deep Dive (类型系统、泛型)
      - 闭包/作用域问题 → YDKJS Scope & Closures
      - this 绑定问题 → YDKJS this & Object Prototypes
      - Promise/async 模式 → YDKJS Async & Performance, Flanagan Ch13
      - 类型转换/陷阱 → YDKJS Types & Grammar
      - DOM 操作 → Flanagan Ch15, Eloquent JS Ch14-15
      - 模块系统 → YDKJS ES6 & Beyond, Flanagan Ch10
      - 代码整洁/组件设计 → Clean Code Ch2-4
      - 重构手法 → Refactoring (代码坏味道目录)
      - 设计模式 → GoF (Observer, Strategy, Decorator)

  dev-python_frontend:
    primary:
      - ramalho_fluent_python # Pythonic UI composition, functions, data structures
      - beazley_python_cookbook # Practical Python patterns for app structure and utilities
      - krug_dont_make_me_think # Usability and interaction clarity for UI work
    secondary:
      - norman_design_everyday_things # Feedback, mappings, constraints, user-centered interactions
      - martin_clean_code # Naming, function boundaries, readability
      - fowler_refactoring # Safe refactoring for growing UI files
      - google_swe # Review discipline and maintainability
      - hunt_pragmatic_programmer # DRY, tracer bullets, iterative delivery
    usage: |
      生成 Python 前端代码时：
      - Streamlit/Gradio/NiceGUI 页面组织 → 参考 Fluent Python（函数、对象组合、可读性）
      - UI 辅助函数/状态组织 → 参考 Python Cookbook
      - 可用性与导航 → 参考 Don't Make Me Think
      - 反馈、错误提示、交互映射 → 参考 Design of Everyday Things
      - 命名与函数拆分 → 参考 Clean Code Ch2-4
      - 渐进式重构 → 参考 Refactoring（代码坏味道目录）
      - 增量交付与快速验证 → 参考 Pragmatic Programmer

  dev-senior_architect:
    primary:
      - cormen_CLRS # 算法复杂度分析、数据结构选择
      - manning_intro_to_ir # 搜索架构、索引设计
      - kleppmann_ddia # 分布式系统、数据模型、一致性、流处理
      - martin_clean_architecture # SOLID、分层架构、依赖规则、组件原则
    secondary:
      - boyd_convex_optimization # 优化问题建模
      - deisenroth_mml # 数学基础决策
      - gof_design_patterns # 创建型/结构型/行为型模式
      - ejsmont_web_scalability # 缓存、负载均衡、CDN、消息队列
      - percival_cosmic_python # DDD、Repository 模式、CQRS、事件驱动
      - nygard_release_it # 稳定性模式、熔断器、容错
      - google_sre # SLO、容量规划、可靠性架构
      - gourley_http_definitive_guide # HTTP 协议、代理架构、网关设计
      - aumasson_serious_cryptography # 加密体系架构、密钥管理
      - seitz_black_hat_python # 协议逆向、代理构建、网络安全架构
    usage: |
      系统架构设计时：
      - 分布式系统设计 → DDIA Part I-II (数据模型、复制、分区)
      - 分层架构/依赖管理 → Clean Architecture Part III-V
      - 设计模式选择 → GoF (按场景查阅)
      - 扩展性设计 → Web Scalability + DDIA Part II
      - 稳定性/容错 → Release It! Ch3-5 + SRE Ch17-21
      - HTTP/代理架构 → HTTP Definitive Guide Ch6 (代理), Ch8 (网关)
      - 加密体系设计 → Serious Cryptography Ch4-7 (对称加密, 密钥派生)
      - 协议逆向架构 → Black Hat Python Ch2-5 (网络, 代理, SSH)
      - 数据结构选型 → CLRS Part III (数据结构)
      - 算法复杂度评估 → CLRS Part I (复杂度基础)
      - 搜索/索引架构 → Manning IR Ch1-4
      - 图算法（依赖分析）→ CLRS Part VI (图算法)
      - 动态规划（缓存策略）→ CLRS Ch15

  dev-senior_fullstack:
    primary:
      - ramalho_fluent_python
      - flanagan_js_definitive_guide
    secondary:
      - beazley_python_cookbook
      - haverbeke_eloquent_javascript
      - cormen_CLRS
      - manning_intro_to_ir
      - kleppmann_ddia # 全栈系统设计
      - martin_clean_architecture # 分层架构
      - basarat_typescript_deep_dive # TypeScript 类型系统
    usage: |
      全栈开发时按前后端分别查阅对应教科书。
      - 系统设计 → DDIA
      - 架构分层 → Clean Architecture
      - TypeScript → TS Deep Dive

  dev-senior_data_engineer:
    primary:
      - ramalho_fluent_python # 迭代器/生成器（流式处理）
      - beazley_python_cookbook # 数据处理配方
      - kleppmann_ddia # 数据模型、存储引擎、批处理、流处理
      - fontaine_art_of_postgresql # SQL 模式、索引、查询优化
    secondary:
      - downey_think_stats_2e # 统计与数据分析
      - cormen_CLRS # 排序/搜索/图（ETL 管道）
      - grinstead_snell_probability # 概率采样
    usage: |
      数据工程：
      - 流式处理/生成器 → Fluent Python Ch17
      - 数据模型选型 → DDIA Ch2-3
      - ETL 管道架构 → DDIA Ch10-11 (batch + stream)
      - SQL 优化/复杂查询 → Art of PostgreSQL
      - 数据清洗模式 → Python Cookbook Ch1-2
      - 统计验证 → Think Stats
      - 大数据排序/归并 → CLRS Ch2, Ch8

  dev-senior_qa:
    primary:
      - okken_python_testing_pytest # fixtures、参数化、markers、插件、conftest
      - google_swe # 测试文化、测试策略、大规模测试
      - beazley_python_cookbook # 测试模式 (Ch14)
      - ramalho_fluent_python # Python 语义理解（正确测试前提）
    secondary:
