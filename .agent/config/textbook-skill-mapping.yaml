    secondary:
      - flanagan_js_definitive_guide # JSDoc 规范
      - martin_clean_code # 注释哲学（Ch4: 好注释 vs 坏注释）
    usage: |
      添加注释时：
      - Python docstring → Fluent Python
      - JSDoc → JS Definitive Guide
      - 注释哲学（何时该写/不该写）→ Clean Code Ch4

